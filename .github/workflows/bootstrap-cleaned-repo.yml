name: Bootstrap cleaned repository

on:
  push:
    paths:
      - 'bootstrap/repo_text_only.tar.gz.b64'
      - '.github/workflows/bootstrap-cleaned-repo.yml'

permissions:
  contents: write

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: true
      - name: Extract cleaned repository
        run: |
          base64 -d bootstrap/repo_text_only.tar.gz.b64 > /tmp/repo_text_only.tar.gz
          tar -xzf /tmp/repo_text_only.tar.gz -C .
          rm -rf bootstrap
          rm -f .github/workflows/bootstrap-cleaned-repo.yml
      - name: Commit cleaned repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add cleaned reproducible code release" || echo "No changes to commit"
          git push
